# Example Configuration block for Nginx Proxy limits
# You can include these inside your server { ... } or location / { ... } block to prevent Gateway Timeout 504.

server {
    listen 80;
    server_name your_domain.com;

    location / {
        proxy_pass http://localhost:8000;
        
        # INCREASE TIMEOUTS FOR HEAVY AI LOADS (10 MINUTES)
        proxy_read_timeout 600s;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        
        # Buffer tweaks in case proxying large video/media payloads
        proxy_buffers 8 16k;
        proxy_buffer_size 32k;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
